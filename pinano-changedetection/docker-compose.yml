services:
  app_proxy:
    environment:
      APP_HOST: pinano-changedetection_server_1
      APP_PORT: 5000
    container_name: pinano-changedetection_app_proxy_1
  server:
    image: dgtlmoon/changedetection.io:latest
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/datastore
    restart: on-failure
    stop_grace_period: 1m
    container_name: pinano-changedetection_server_1
